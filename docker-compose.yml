#############################################################################
################ DEVELOPMENT WITH HOT MODULE REPLACEMENT ####################
#############################################################################
volumes:
  database-v:
    name: "database-v"

services:
  fiscalismia-postgres:
    image: ${POSTGRES_HOST}:1.0.0
    container_name: ${POSTGRES_HOST}
    build:
      context: .
      dockerfile: database/Dockerfile.dev-db
    env_file:
      - .env
    volumes:
      - database-v:/var/lib/postgresql/data
    networks:
      - fiscalismia-network
    ports:
      - "0.0.0.0:5432:5432/tcp"
    command: "-p ${POSTGRES_PORT}"
    # to use healthcheck for backend server see https://wittcode.com/blogs/connect-a-node-server-to-postgres-with-docker-compose
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -p ${POSTGRES_PORT} -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      start_period: 0s
      interval: 5s
      timeout: 5s
      retries: 5

  fiscalismia-backend:
    image: fiscalismia-backend-dev:latest
    container_name: fiscalismia-backend-dev
    build:
      context: .
      dockerfile: Dockerfile.dev
      pull: true
    environment:
      - CLOUD_DB=${CLOUD_DB:-false} # default is false. Overwrite in CLI
    env_file:
      - .env
    volumes:
      # The ':z' flag is required on SELinux-enabled systems (like Fedora/CentOS)
      # to relabel the host directory. This allows the container to access the
      # mounted volume by applying a shared SELinux label.
      - ./src:/fiscalismia-backend/src:z
      - ./public:/fiscalismia-backend/public:z
    networks:
      - fiscalismia-network
    ports:
      - "0.0.0.0:3002:3002/tcp"
    depends_on:
      - fiscalismia-postgres

  fiscalismia-webscraper:
    image: fiscalismia-webscraper-dev:latest
    container_name: fiscalismia-webscraper-dev
    build:
      context: ../fiscalismia-webscraper
      dockerfile: Dockerfile
      pull: true
      args:
        BUILD_VERSION: dev-latest
    environment:
      APP_VERSION: dev-latest
    env_file:
      - ../fiscalismia-webscraper/.env
    volumes:
      # The ':z' flag is required on SELinux-enabled systems (like Fedora/CentOS)
      # to relabel the host directory. This allows the container to access the
      # mounted volume by applying a shared SELinux label.
      - ../fiscalismia-webscraper/main.py:/app/main.py:z
      - ../fiscalismia-webscraper/api/:/app/api:z
      # Bind mount for /tmp/scrape_results overlays the tmpfs at /tmp, because
      # Podman processes bind mounts after tmpfs. This makes scrape output files
      # visible on the host for debugging
      - ../fiscalismia-webscraper/scrape_results:/tmp/scrape_results:z
      - ../fiscalismia-webscraper/scrape_test:/tmp/scrape_test:z
    networks:
      - fiscalismia-network
    # Binding directly to uvicorn app port skips nginx on port 5000 entirely
    ports:
      - "0.0.0.0:3003:3003/tcp"
    # tmpfs provides a fast in-memory /tmp for Playwright browser temp files.
    # Note: tmpfs is container-scoped and not visible on the host
    tmpfs:
      - /tmp:noexec,nosuid,size=512m
    # command overwrites entrypoint, essentially bypassing supervisord and nginx
    # in order for uvicorn hot reload to work on mounted directories
    command: >
      uvicorn api.main:fastapi
      --host 0.0.0.0
      --port ${FASTAPI_PORT}
      --reload
      --reload-dir /app/api
      --timeout-keep-alive 90
      --log-level info
      --loop uvloop

  fiscalismia-frontend:
    image: fiscalismia-frontend-dev:latest
    container_name: fiscalismia-frontend-dev
    build:
      context: ../fiscalismia-frontend
      dockerfile: Dockerfile.dev
      pull: true
    env_file:
      - ../fiscalismia-frontend/.env
    volumes:
      # The ':z' flag is required on SELinux-enabled systems (like Fedora/CentOS)
      # to relabel the host directory. This allows the container to access the
      # mounted volume by applying a shared SELinux label.
      - ../fiscalismia-frontend/src:/fiscalismia-frontend/src:z
    networks:
      - fiscalismia-network
    ports:
      - "0.0.0.0:3001:3001/tcp"
    depends_on:
      - fiscalismia-backend

networks:
  fiscalismia-network:
    name: fiscalismia-network
    driver: bridge

# to connect to db in attached docker shell, (RUN apk add --no-cache postgresql-client):
# psql -U $POSTGRES_USER -d $POSTGRES_DB -h $POSTGRES_HOST -p $POSTGRES_PORT
# to connect from local machine, the host has to be localhost!
# psql -U $POSTGRES_USER -d $POSTGRES_DB -h localhost -p $POSTGRES_PORT